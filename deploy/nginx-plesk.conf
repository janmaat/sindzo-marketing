# nginx-snippet voor Plesk — plak in:
#   Plesk → Websites & Domeinen → coheza.nl → Apache & nginx-instellingen
#   → "Aanvullende nginx-instructies" (Additional nginx directives)
#
# Plesk schopt deze regels in de bestaande server { } context, dus geen
# eigen server-block nodig. De volgorde hieronder is belangrijk.

# ----- Canonical: trailing slash weg (Astro: trailingSlash: 'never') -----
rewrite ^/(.*)/$ /$1 permanent;

# ----- Extensionless URLs: /trust → /trust/index.html -----
location / {
    try_files $uri $uri/index.html $uri.html =404;
}

# ----- Cache fingerprinted Astro-assets voor 1 jaar (immutable) -----
location ^~ /_astro/ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

# ----- Fonts, ook fingerprinted of stabiel — 1 jaar -----
location ~* \.(woff2|woff|ttf|otf|eot)$ {
    add_header Cache-Control "public, max-age=31536000, immutable" always;
    try_files $uri =404;
}

# ----- HTML mag nooit lang cachen (anders zien bezoekers oude deploys) -----
location ~* \.html$ {
    add_header Cache-Control "public, max-age=0, must-revalidate" always;
    try_files $uri =404;
}

# ----- Brotli + gzip — Plesk heeft beide modules in nginx -----
gzip on;
gzip_vary on;
gzip_min_length 1024;
gzip_comp_level 6;
gzip_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/ttf;

brotli on;
brotli_comp_level 5;
brotli_types
    text/plain text/css text/xml text/javascript
    application/javascript application/json application/xml
    image/svg+xml font/ttf;

# ----- Security headers (HSTS + standaard set) -----
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
add_header X-Content-Type-Options "nosniff" always;
add_header Referrer-Policy "strict-origin-when-cross-origin" always;
add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
add_header X-Frame-Options "DENY" always;

# ----- MIME-types die niet altijd in nginx default-mime.types staan -----
types {
    application/manifest+json webmanifest;
    font/woff2 woff2;
}

# ----- 404-pagina -----
error_page 404 /404.html;
location = /404.html {
    internal;
}
